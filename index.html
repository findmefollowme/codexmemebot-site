<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>codexmemebot</title>
  <style>
    :root {
      --bg: #0b0d12;
      --panel: #121621;
      --text: #e8edf7;
      --muted: #98a3b8;
      --line: #283042;
      --accent: #4cc2ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #142033, var(--bg) 55%);
      color: var(--text);
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    .card {
      background: rgba(18, 22, 33, 0.92);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 16px 60px rgba(0, 0, 0, 0.32);
    }
    h1 { margin-top: 0; font-size: 42px; }
    p { color: var(--muted); line-height: 1.7; }
    ul { padding-left: 20px; line-height: 1.8; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>codexmemebot</h1>
      <p>
        This site provides the public-facing policy pages used by the codexmemebot X app.
      </p>
      <ul>
        <li><a href="./privacy-policy.html">Privacy Policy</a></li>
        <li><a href="./terms-of-service.html">Terms of Service</a></li>
      </ul>
      <p>
        Contact: the operator of this application.
      </p>
    </section>
  </main>
</body>
</html>
